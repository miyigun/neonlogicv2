<!DOCTYPE html>
<html lang="tr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Neon Logic: Matrix Puzzle</title>
	<style>
		@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

		:root {
			--bg-color: #050505;
			--panel-bg: #1a1a1a;
			--target-active: #000000;
			--target-inactive: #e0e0e0;
			--player-active: #00f3ff; /* Neon Cyan */
			--player-active-shadow: 0 0 15px #00f3ff;
			--player-inactive: #2a2a2a;
			--accent: #ff0055; /* Neon Pink */
		}

		body {
			font-family: 'Orbitron', sans-serif;
			background-color: var(--bg-color);
			color: white;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			margin: 0;
			overflow: hidden;
		}

		h1 {
			font-size: 2rem;
			text-transform: uppercase;
			letter-spacing: 3px;
			margin-bottom: 10px;
			text-shadow: 0 0 10px var(--accent);
		}

		.info-text {
			font-size: 0.9rem;
			color: #888;
			margin-bottom: 20px;
			text-align: center;
			max-width: 600px;
		}

		.game-container {
			display: flex;
			gap: 50px;
			align-items: center;
			justify-content: center;
			flex-wrap: wrap;
		}

		.panel {
			background: var(--panel-bg);
			padding: 20px;
			border-radius: 15px;
			border: 1px solid #333;
			box-shadow: 0 10px 30px rgba(0,0,0,0.5);
			text-align: center;
		}

		.panel-title {
			margin-bottom: 15px;
			font-size: 1.2rem;
			color: #aaa;
			letter-spacing: 1px;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(5, 50px);
			grid-template-rows: repeat(5, 50px);
			gap: 5px;
		}

		/* TARGET GRID STYLES */
		.cell-target {
			width: 50px;
			height: 50px;
			background-color: var(--target-inactive);
			border-radius: 4px;
			transition: all 0.3s ease;
		}
		.cell-target.active {
			background-color: var(--target-active);
			box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
			border: 1px solid #333;
		}

		/* PLAYER GRID STYLES */
		.cell-player {
			width: 50px;
			height: 50px;
			background-color: var(--player-inactive);
			border-radius: 4px;
			cursor: pointer;
			transition: all 0.2s ease;
			position: relative;
		}
		.cell-player:hover {
			border: 1px solid var(--player-active);
		}
		.cell-player.active {
			background-color: var(--player-active);
			box-shadow: var(--player-active-shadow);
			border: none;
		}
		/* Ripple effect click animation */
		.cell-player:active {
			transform: scale(0.95);
		}

		.controls {
			margin-top: 30px;
			display: flex;
			gap: 20px;
			align-items: center;
		}

		button {
			background: transparent;
			color: var(--accent);
			border: 2px solid var(--accent);
			padding: 10px 30px;
			font-family: 'Orbitron', sans-serif;
			font-size: 1rem;
			cursor: pointer;
			text-transform: uppercase;
			transition: all 0.3s;
			border-radius: 5px;
		}

		button:hover {
			background: var(--accent);
			color: white;
			box-shadow: 0 0 20px var(--accent);
		}

		.level-badge {
			font-size: 1.5rem;
			color: var(--player-active);
			text-shadow: 0 0 10px var(--player-active);
		}

		/* Notification Modal */
		#notification {
			position: fixed;
			top: 20px;
			background: rgba(0, 243, 255, 0.2);
			backdrop-filter: blur(5px);
			border: 1px solid var(--player-active);
			color: white;
			padding: 15px 30px;
			border-radius: 8px;
			transform: translateY(-100px);
			transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
			z-index: 1000;
		}
		#notification.show {
			transform: translateY(0);
		}

	</style>
</head>
<body>

	<div id="notification">SİSTEM EŞLEŞTİ - SEVİYE TAMAMLANDI</div>

	<h1>Neon <span style="color:var(--player-active)">Logic</span></h1>
	<p class="info-text">
		DİKKAT: Her tıklama, seçilen hücreyi ve <b>komşularını (sağ, sol, alt, üst)</b> tersine çevirir.<br>
		Sağdaki panelde hamlelerini yaparak soldaki <b>KARA DESENİ</b> oluştur.
	</p>

	<div class="controls">
		<div class="level-badge">LEVEL <span id="levelDisplay">1</span></div>
		<button onclick="resetLevel()">Sıfırla</button>
		<button onclick="nextLevel()">Pas Geç</button>
	</div>

	<div class="game-container">
		<div class="panel">
			<div class="panel-title">HEDEF (TARGET)</div>
			<div class="grid" id="targetGrid"></div>
		</div>

		<div class="panel">
			<div class="panel-title">KONTROL (INPUT)</div>
			<div class="grid" id="playerGrid"></div>
		</div>
	</div>

	<script>
		const gridSize = 5; // 5x5 Grid for higher difficulty
		let currentLevel = 1;
		let targetPattern = [];
		let playerPattern = [];

		const targetGridEl = document.getElementById('targetGrid');
		const playerGridEl = document.getElementById('playerGrid');
		const levelDisplay = document.getElementById('levelDisplay');
		const notification = document.getElementById('notification');

		// Initialize Grids
		function createGrids() {
			targetGridEl.innerHTML = '';
			playerGridEl.innerHTML = '';

			for (let i = 0; i < gridSize * gridSize; i++) {
				// Target Cell
				let tCell = document.createElement('div');
				tCell.classList.add('cell-target');
				tCell.dataset.index = i;
				targetGridEl.appendChild(tCell);

				// Player Cell
				let pCell = document.createElement('div');
				pCell.classList.add('cell-player');
				pCell.dataset.index = i;
				pCell.addEventListener('click', () => handleInput(i));
				playerGridEl.appendChild(pCell);
			}
		}

		// The Core Logic: Toggle cell and neighbors
		function toggleState(arr, index) {
			const row = Math.floor(index / gridSize);
			const col = index % gridSize;

			// Helper to toggle a single bit safely
			const flip = (r, c) => {
				if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) {
					const idx = r * gridSize + c;
					arr[idx] = !arr[idx];
				}
			};

			// Toggle self
			flip(row, col);
			// Toggle neighbors (Up, Down, Left, Right)
			flip(row - 1, col); // Up
			flip(row + 1, col); // Down
			flip(row, col - 1); // Left
			flip(row, col + 1); // Right
		}

		function handleInput(index) {
			// Apply logic to player's grid data
			toggleState(playerPattern, index);
			updatePlayerVisuals();
			checkWin();
		}

		function updatePlayerVisuals() {
			const cells = playerGridEl.children;
			for (let i = 0; i < playerPattern.length; i++) {
				if (playerPattern[i]) {
					cells[i].classList.add('active');
				} else {
					cells[i].classList.remove('active');
				}
			}
		}

		function updateTargetVisuals() {
			const cells = targetGridEl.children;
			for (let i = 0; i < targetPattern.length; i++) {
				if (targetPattern[i]) {
					cells[i].classList.add('active'); // Black
				} else {
					cells[i].classList.remove('active'); // Gray
				}
			}
		}

		function generateLevel() {
			// Reset Arrays
			targetPattern = new Array(gridSize * gridSize).fill(false);
			playerPattern = new Array(gridSize * gridSize).fill(false);
			
			// To ensure the level is solvable, we start with a blank target
			// and apply random "moves" to it.
			// The user just has to find the reverse combination.
			
			let difficulty = currentLevel + 2; // Increase randomness with level
			let moves = 0;

			// Make a temporary copy to simulate the target
			let tempTarget = [...targetPattern];

			while (moves < difficulty) {
				let rIdx = Math.floor(Math.random() * (gridSize * gridSize));
				toggleState(tempTarget, rIdx);
				moves++;
			}
			targetPattern = tempTarget;

			updateTargetVisuals();
			updatePlayerVisuals(); // Player starts blank
		}

		function checkWin() {
			let isWin = true;
			for (let i = 0; i < gridSize * gridSize; i++) {
				if (targetPattern[i] !== playerPattern[i]) {
					isWin = false;
					break;
				}
			}

			if (isWin) {
				showNotification();
				setTimeout(() => {
					currentLevel++;
					levelDisplay.innerText = currentLevel;
					generateLevel();
				}, 1500);
			}
		}

		function showNotification() {
			notification.classList.add('show');
			setTimeout(() => {
				notification.classList.remove('show');
			}, 1500);
		}

		function resetLevel() {
			playerPattern = new Array(gridSize * gridSize).fill(false);
			updatePlayerVisuals();
		}

		function nextLevel() {
			currentLevel++;
			levelDisplay.innerText = currentLevel;
			generateLevel();
		}

		// Init Game
		createGrids();
		generateLevel();

	</script>
</body>
</html>
